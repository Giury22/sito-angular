<!-- SEZIONE BIGLIETTI -->
<section class="page-card">
  <h1>{{ lang.t().biglietti.title }}</h1>
  <p>{{ lang.t().biglietti.description }}</p>

  <!-- GRIGLIA BIGLIETTI -->
  <div class="ticket-grid" [attr.aria-label]="lang.t().biglietti.gridLabel">
    <article>
      <h2>{{ lang.t().biglietti.interoTitle }}</h2>
      <p>{{ lang.t().biglietti.interoDesc }}</p>
      <p>
        <strong>{{ lang.t().biglietti.interoPrice }}</strong>
      </p>
    </article>
    <article>
      <h2>{{ lang.t().biglietti.ridottoTitle }}</h2>
      <p>{{ lang.t().biglietti.ridottoDesc }}</p>
      <p>
        <strong>{{ lang.t().biglietti.ridottoPrice }}</strong>
      </p>
    </article>
  </div>
</section>
